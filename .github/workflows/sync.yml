name: Sync and Run Tests

on:
  schedule:
    - cron: '*/1 * * * *' # A cada 1 minuto
  workflow_dispatch:

jobs:
  sync:
    name: Sync Fork
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: git remote add upstream https://github.com/imputnet/cobalt.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream/main into main
        run: |
          git checkout main
          git merge upstream/main --no-edit || echo "Sem alterações para mesclar."

      - name: Push changes
        run: |
          git push origin main || echo "Nada novo para enviar."

  notify:
    name: Notificar Telegram
    needs: sync
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Enviar mensagem
        run: |
          STATUS="${{ needs.sync.result }}"
          MENSAGEM=""
          if [ "$STATUS" = "success" ]; then
            MENSAGEM="✅ Fork sincronizado com sucesso!"
          elif [ "$STATUS" = "failure" ]; then
            MENSAGEM="❌ Erro ao sincronizar o fork!"
          else
            MENSAGEM="⚠️ Workflow finalizado com status: $STATUS"
          fi
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MENSAGEM"
