name: Sync and Run Tests

on:
  schedule:
    - cron: '0 3 * * 0'  # Executa todo domingo às 03:00 UTC
  workflow_dispatch:
  push:
  pull_request:

jobs:
  sync:
    name: Sync fork with upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream repo
        uses: actions/checkout@v4
        with:
          repository: imputnet/cobalt
          token: ${{ secrets.GITHUB_TOKEN }}
          path: upstream

      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          path: myfork

      - name: Sync with upstream
        run: |
          cd myfork
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream ../upstream
          git fetch upstream
          git merge upstream/main --allow-unrelated-histories -m "🔄 Sync fork"
          git push origin main

  check-lockfile:
    name: Check lockfile
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Check lockfile
        run: pnpm install --frozen-lockfile

  test-web:
    name: Web sanity check
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - uses: pnpm/action-setup@v4
      - run: .github/test.sh web

  test-api:
    name: API sanity check + Telegram
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - run: .github/test.sh api
      - name: Send Telegram Notification
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ Fork sincronizado e testes executados com sucesso!"
